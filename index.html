<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sentiment Analysis</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            background: linear-gradient(135deg, #1a2980, #26d0ce);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: rgba(255, 255, 255, 0.98);
            border-radius: 20px;
            padding: 2.5rem;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            width: 100%;
            max-width: 700px;
        }

        .logo-container {
            text-align: center;
            margin-bottom: 2rem;
        }

        .logo {
            font-size: 3rem;
            color: #1a2980;
            margin-bottom: 0.5rem;
        }

        h1 {
            color: #1a2980;
            text-align: center;
            margin-bottom: 0.5rem;
            font-weight: 600;
            font-size: 2rem;
        }

        .subtitle {
            text-align: center;
            color: #666;
            margin-bottom: 2rem;
            font-size: 0.9rem;
        }

        textarea {
            width: 100%;
            padding: 1rem;
            border: 2px solid #e2e8f0;
            border-radius: 12px;
            margin-bottom: 1rem;
            resize: vertical;
            min-height: 120px;
            font-size: 1rem;
            transition: border-color 0.3s ease;
        }

        textarea:focus {
            outline: none;
            border-color: #1a2980;
        }

        button {
            background: linear-gradient(135deg, #1a2980, #26d0ce);
            color: white;
            border: none;
            padding: 1rem 2rem;
            border-radius: 12px;
            cursor: pointer;
            font-size: 1rem;
            font-weight: 500;
            transition: all 0.3s ease;
            width: 100%;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(26, 41, 128, 0.3);
        }

        #result {
            margin-top: 1.5rem;
            padding: 1.5rem;
            border-radius: 12px;
            display: none;
            transition: all 0.3s ease;
        }

        .positive {
            background: linear-gradient(135deg, #c6f6d5, #9ae6b4);
            border: none;
        }

        .negative {
            background: linear-gradient(135deg, #fed7d7, #feb2b2);
            border: none;
        }

        .neutral {
            background: linear-gradient(135deg, #e2e8f0, #cbd5e0);
            border: none;
        }

        .score-details {
            margin-top: 1rem;
            font-size: 0.95rem;
            color: #2d3748;
            background: rgba(255, 255, 255, 0.7);
            padding: 1rem;
            border-radius: 8px;
        }

        .score-details p {
            margin: 0.5rem 0;
            display: flex;
            justify-content: space-between;
        }

        .score-label {
            font-weight: 500;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo-container">
            <i class="fas fa-brain logo"></i>
            <h1>Sentiment Analysis</h1>
            <p class="subtitle">Analyze the emotional tone of your text using advanced AI</p>
        </div>
        <textarea id="text" placeholder="Enter your text here to analyze its sentiment..."></textarea>
        <button onclick="analyzeSentiment()">
            <i class="fas fa-search"></i> Analyze Sentiment
        </button>
        <div id="result"></div>
    </div>

    <script>
        async function analyzeSentiment() {
            const text = document.getElementById('text').value;
            const result = document.getElementById('result');

            if (!text) {
                alert('Please enter some text to analyze');
                return;
            }

            try {
                result.innerHTML = '<div style="text-align: center; padding: 1rem;"><i class="fas fa-spinner fa-spin"></i> Analyzing...</div>';
                result.style.display = 'block';
                result.className = 'neutral';

                const response = await fetch('/api/sentiment', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ text })
                });

                const data = await response.json();
                result.className = data.label.toLowerCase();
                result.innerHTML = `
                    <h3 style="margin-bottom: 1rem; color: #2d3748;">
                        <i class="fas fa-${data.label.toLowerCase() === 'positive' ? 'smile' : data.label.toLowerCase() === 'negative' ? 'frown' : 'meh'}"></i>
                        Sentiment: ${data.label}
                    </h3>
                    <div class="score-details">
                        <p><span class="score-label">Positive:</span> ${(data.scores.pos * 100).toFixed(1)}%</p>
                        <p><span class="score-label">Neutral:</span> ${(data.scores.neu * 100).toFixed(1)}%</p>
                        <p><span class="score-label">Negative:</span> ${(data.scores.neg * 100).toFixed(1)}%</p>
                        <p><span class="score-label">Compound:</span> ${data.scores.compound.toFixed(3)}</p>
                    </div>
                `;
            } catch (error) {
                console.error('Error:', error);
                result.style.display = 'block';
                result.className = 'negative';
                result.innerHTML = '<i class="fas fa-exclamation-circle"></i> An error occurred while analyzing the sentiment.';
            }
        }
    </script>
</body>
</html>
